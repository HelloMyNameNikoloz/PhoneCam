name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0-beta.1"
        required: true
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: "true"
      draft:
        description: "Create as draft"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  validate:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ github.ref_name }}" }
          if ($version -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') { throw "Invalid version tag: $version" }
          $pre = "${{ github.event.inputs.prerelease }}"
          if (-not $pre) { $pre = [string]($version -match 'alpha|beta|rc') }
          $draft = "${{ github.event.inputs.draft }}"
          if (-not $draft) { $draft = "false" }
          "version=$version" >> $env:GITHUB_OUTPUT
          "prerelease=$($pre.ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "draft=$($draft.ToLowerInvariant())" >> $env:GITHUB_OUTPUT
      - shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools/release/validate_publish_ready.ps1 -Version ${{ steps.meta.outputs.version }} -SkipBuild

  build-android:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build Android Companion
        shell: pwsh
        run: |
          ./tools/build_android_companion.ps1 -Version ${{ needs.validate.outputs.version }} -OutputDir release-assets
      - name: Diagnostic & Copy APK
        shell: pwsh
        run: |
          Write-Host "=== Diagnostic: Listing Android APK outputs ==="
          if (Test-Path android/phonecam-companion/app/build/outputs) {
            Get-ChildItem -Path android/phonecam-companion/app/build/outputs -Recurse -File | Select-Object FullName, Length
          } else {
            Write-Warning "outputs directory does not exist!"
          }
          
          # Create release-assets/ directory at the workspace root
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          
          # Find and copy built APK
          $SourceApk = "android/phonecam-companion/app/build/outputs/apk/debug/app-debug.apk"
          if (-not (Test-Path $SourceApk)) {
            $SourceApk = "android/phonecam-companion/app/build/outputs/apk/release/app-release.apk"
          }
          
          if (-not (Test-Path $SourceApk)) {
            Write-Error "Error: Built APK was not found at expected paths!"
            exit 1
          }
          
          $DestApk = "release-assets/PhoneCam-Android-${{ needs.validate.outputs.version }}.apk"
          Copy-Item -Path $SourceApk -Destination $DestApk -Force
          Write-Host "Successfully copied APK from $SourceApk to $DestApk"
          
          Write-Host "=== Diagnostic: Listing release-assets/ ==="
          Get-ChildItem -Path release-assets -Recurse -File | Select-Object FullName, Length
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: release-assets/PhoneCam-Android-${{ needs.validate.outputs.version }}.apk
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - shell: pwsh
        run: |
          Set-Content "phonecam\assets\version.txt" "${{ needs.validate.outputs.version }}".TrimStart("v") -Encoding utf8
          python -m pip install -r phonecam\requirements.txt
          powershell -ExecutionPolicy Bypass -File tools/build_driverless_camera.ps1
          Push-Location phonecam
          python build_tools\build_exe.py
          Pop-Location
          powershell -ExecutionPolicy Bypass -File tools/build_installer.ps1 -Version ${{ needs.validate.outputs.version }}
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item "release\PhoneCam-Setup-${{ needs.validate.outputs.version }}.msi" release-assets\
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release-assets/PhoneCam-Setup-${{ needs.validate.outputs.version }}.msi

  package-release:
    runs-on: windows-latest
    needs: [validate, build-windows, build-android]
    steps:
      - uses: actions/checkout@v4
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android
          path: release-assets
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: release-assets
      - shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          $notes = "release-assets\PhoneCam-$version-release-notes.md"
          @"
          # PhoneCam $version

          Public beta build for Windows 11 and Android.

          Assets include the Windows MSI installer, Android companion APK, and SHA256 checksums.

          Known limitations:
          - Windows 11 is the public v1 target.
          - Windows 10 is experimental and may need future signed-driver work.
          - 1080p30 is the stability target; higher modes are best-effort.
          - Installer and app may show SmartScreen warnings when unsigned.
          "@ | Set-Content $notes -Encoding utf8
          Get-ChildItem release-assets -File |
            Where-Object { $_.Name -notlike "*checksums.txt" } |
            Sort-Object Name |
            ForEach-Object {
              "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant())  $($_.Name)"
            } | Set-Content "release-assets\PhoneCam-$version-checksums.txt" -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/*

  create-release:
    runs-on: ubuntu-latest
    needs: [validate, package-release]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: PhoneCam ${{ needs.validate.outputs.version }}
          body_path: release-assets/PhoneCam-${{ needs.validate.outputs.version }}-release-notes.md
          prerelease: ${{ needs.validate.outputs.prerelease }}
          draft: ${{ needs.validate.outputs.draft }}
          files: release-assets/*
