name: Installation problem
description: Report an installer, launch, or camera registration issue
title: "[Install]: "
labels: ["installation"]
body:
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What failed?
    validations:
      required: true
